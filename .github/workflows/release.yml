name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: read

jobs:
  version-check:
    name: Verify manifest version matches tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compare tag with manifest version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          manifest_version="$(jq -r '.version' custom_components/vialitoral/manifest.json)"
          echo "Tag: ${GITHUB_REF_NAME} (normalized: ${tag})"
          echo "Manifest version: ${manifest_version}"
          if [ "${tag}" != "${manifest_version}" ]; then
            echo "::error::Tag '${GITHUB_REF_NAME}' does not match manifest version '${manifest_version}'."
            exit 1
          fi

  hassfest:
    name: Hassfest validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run hassfest
        uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run HACS action
        uses: hacs/action@main
        with:
          category: integration
          # Skip the brands check until the domain is registered in
          # home-assistant/brands. Remove once the brands PR is merged.
          ignore: brands

  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: [version-check, hassfest, hacs]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
